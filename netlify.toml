[build]
  command = "node deploy/write-frontend-config.mjs"
  publish = "mvp-app/static"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
